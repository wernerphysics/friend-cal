{% extends "base.html" %}

{% block title %}Login - Friend Calendar{% endblock %}

{% block body %}
  <div class="container">
    <h1 class="title">Friend Calendar</h1>
    <form hx-post="/login" hx-target="this" hx-swap="outerHTML"
          hx-select=".auth-form" class="auth-form">
      <h2 class="form-heading">Log In</h2>
      {% if error %}
      <p class="form-error">{{ error }}</p>
      {% endif %}
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Log In</button>
      </div>
      <p class="form-footer">No account? <a href="/signup">Sign up</a></p>
    </form>
  </div>
{% endblock %}
