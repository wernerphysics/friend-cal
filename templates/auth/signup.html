<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Friend Calendar</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <div class="container">
    <h1 class="title">Friend Calendar</h1>
    <form hx-post="/signup" hx-target="this" hx-swap="outerHTML" class="auth-form">
      <h2 class="form-heading">Sign Up</h2>
      {% if error %}
      <p class="form-error">{{ error }}</p>
      {% endif %}
      <div class="form-group">
        <label for="invite_code">Invite Code</label>
        <input type="text" id="invite_code" name="invite_code" required autofocus>
      </div>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Sign Up</button>
      </div>
      <p class="form-footer">Already have an account? <a href="/login">Log in</a></p>
    </form>
  </div>
</body>
</html>
